# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Development artifact

concurrency:
  group: build
  cancel-in-progress: true

on:
  push:
    branches:
      - '*'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.101'
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  NEXUSMOD_API_KEY: ${{ secrets.NEXUSMOD_API_KEY }}
  NEXUSMOD_SESSION_COOKIE: ${{ secrets.NEXUSMOD_SESSION_COOKIE }}

jobs:
  get-version:
    runs-on: ubuntu-latest # Cannot use windows
    outputs:
        version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Get version
        id: get-version
        uses: KinsonDigital/VersionMiner@v1.0.0-preview.2
        with:
          repo-owner: ividyon
          repo-name: WitchyBND
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          branch-name: main
          file-format: xml # Not case sensitive
          file-path: "Directory.Build.props"
          version-keys: Version
        
  build-windows:
    needs: get-version
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Dotnet cache
        id: cache-dotnet-core
        uses: actions/cache@v3
        with:
          path: ${{ github.workspace }}/.dotnet
          key: ${{ runner.os }}-dotnet-${{ env.DOTNET_VERSION }}

      - name: NuGet cache
        id: cache-nuget
        uses: actions/cache@v3
        with:
          path: |
            ${{ github.workspace }}/.nuget/packages
            ${{ github.workspace }}/packages
            ${{ github.workspace }}/PromptPlus/**/obj
            ${{ github.workspace }}/WitchyBND/**/obj
            ${{ github.workspace }}/WitchyBND.Shell/**/obj
            ${{ github.workspace }}/WitchyFormats/**/obj
            ${{ github.workspace }}/WitchyLib/**/obj
            ${{ github.workspace }}/WitchyTests/**/obj
            ${{ github.workspace }}/SoulsFormats/**/obj
            ${{ github.workspace }}/SoulsOodleLib/**/obj
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.win-x64.lock.json') }}

      - name: Setup .NET
        if: ${{ steps.cache-dotnet-core.outputs.cache-hit != 'true' }}
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore packages
        if: ${{ steps.cache-nuget.outputs.cache-hit != 'true' }}
        run: dotnet restore -r win-x64 --locked-mode ./WitchyBND.sln --lock-file-path packages.win-x64.lock.json

      - name: Build
        run: dotnet build -r win-x64 -c Release --no-restore WitchyTests # Builds WitchyTests which builds WitchyBND which builds WitchyBND.Shell

      - name: Run unit tests
        run: dotnet test -c Release -r win-x64 --no-build --filter "TestCategory!=SkipOnGitHubAction&TestCategory!=LocalGameFixture&TestCategory!=NativeMacOoz"

      - name: Publish application
        run: dotnet publish -r win-x64 -c Release --no-build WitchyBND

      - name: Archive release
        uses: thedoctor0/zip-release@main
        with:
          type: 'zip'
          filename: '../../../WitchyBND-${{ needs.get-version.outputs.version }}-win-x64.zip'
          directory: './bin/publish/win-x64'
          path: '.'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 'WitchyBND-SHA${{ github.sha }}-win-x64'
          path: WitchyBND-${{ needs.get-version.outputs.version }}-win-x64.zip

      - name: Upload notes
        uses: actions/upload-artifact@v4
        with:
          name: 'WitchyBND-SHA${{ github.sha }}-NOTES'
          path: NOTES.md

  build-linux:
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Dotnet cache
        id: cache-dotnet-core
        uses: actions/cache@v3
        with:
          path: ${{ github.workspace }}/.dotnet
          key: ${{ runner.os }}-dotnet-${{ env.DOTNET_VERSION }}

      - name: NuGet cache
        id: cache-nuget
        uses: actions/cache@v3
        with:
          path: |
            ${{ github.workspace }}/.nuget/packages
            ${{ github.workspace }}/packages
            ${{ github.workspace }}/PromptPlus/**/obj
            ${{ github.workspace }}/WitchyBND/**/obj
            ${{ github.workspace }}/WitchyBND.Shell/**/obj
            ${{ github.workspace }}/WitchyFormats/**/obj
            ${{ github.workspace }}/WitchyLib/**/obj
            ${{ github.workspace }}/WitchyTests/**/obj
            ${{ github.workspace }}/SoulsFormats/**/obj
            ${{ github.workspace }}/SoulsOodleLib/**/obj
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.linux-x64.lock.json') }}

      - name: Setup .NET
        if: ${{ steps.cache-dotnet-core.outputs.cache-hit != 'true' }}
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore packages
        if: ${{ steps.cache-nuget.outputs.cache-hit != 'true' }}
        run: dotnet restore -r linux-x64 --locked-mode ./WitchyBND.sln --lock-file-path packages.linux-x64.lock.json

      - name: Build
        run: dotnet build -c Release -r linux-x64 --no-restore WitchyTests # Builds WitchyTests which builds WitchyBND which builds WitchyBND.Shell

      - name: Run unit tests
        run: dotnet test -c Release -r linux-x64 --no-build --filter "TestCategory!=SkipOnGitHubAction&TestCategory!=LocalGameFixture&TestCategory!=NativeMacOoz"

      - name: Publish application
        run: dotnet publish -c Release -r linux-x64 --no-build WitchyBND

      - name: Archive release
        uses: thedoctor0/zip-release@main
        with:
          type: 'zip'
          filename: '../../../WitchyBND-${{ needs.get-version.outputs.version }}-linux-x64.zip'
          directory: './bin/publish/linux-x64'
          path: '.'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 'WitchyBND-SHA${{ github.sha }}-linux-x64'
          path: WitchyBND-${{ needs.get-version.outputs.version }}-linux-x64.zip

  build-oodle-helper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install MinGW
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build native Oodle Wine helper
        run: WitchyOodleHelper.Native/build.sh

      - name: Inspect helper
        run: file bin/helper/win-x64/WitchyOodleHelper.exe

      - name: Upload helper
        uses: actions/upload-artifact@v4
        with:
          name: oodle-helper-${{ github.sha }}
          path: bin/helper/win-x64/WitchyOodleHelper.exe

  build-macos:
    needs: [get-version, build-oodle-helper]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - rid: osx-arm64
            platform: ARM64
            runner: macos-15
          - rid: osx-x64
            platform: x64
            runner: macos-15-intel
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install zstd
        run: brew install zstd

      - name: Download native Oodle Wine helper
        uses: actions/download-artifact@v4
        with:
          name: oodle-helper-${{ github.sha }}
          path: bin/helper/win-x64

      - name: Restore packages
        run: dotnet restore -r ${{ matrix.rid }} --locked-mode ./WitchyBND.sln --lock-file-path packages.${{ matrix.rid }}.lock.json

      - name: Build
        run: dotnet build -c Release -r ${{ matrix.rid }} --no-restore WitchyTests -p:PlatformTarget=${{ matrix.platform }} -p:MacZstdLibrary="$(brew --prefix zstd)/lib/libzstd.dylib"

      - name: Run unit tests
        run: dotnet test -c Release -r ${{ matrix.rid }} --no-build --filter "TestCategory!=SkipOnGitHubAction&TestCategory!=LocalGameFixture"

      - name: Publish application
        run: dotnet publish -c Release -r ${{ matrix.rid }} --no-build WitchyBND -p:PlatformTarget=${{ matrix.platform }} -p:MacZstdLibrary="$(brew --prefix zstd)/lib/libzstd.dylib"

      - name: Import signing certificate
        if: github.ref == 'refs/heads/main'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/witchybnd-signing.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" /tmp/witchybnd-signing.keychain-db
          security default-keychain -s /tmp/witchybnd-signing.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" /tmp/witchybnd-signing.keychain-db
          security import /tmp/witchybnd-signing.p12 -k /tmp/witchybnd-signing.keychain-db -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" /tmp/witchybnd-signing.keychain-db

      - name: Sign and notarize application
        if: github.ref == 'refs/heads/main'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: dev/sign-notarize-macos.sh bin/publish/${{ matrix.rid }} /tmp/WitchyBND-${{ matrix.rid }}-notary.zip

      - name: Inspect application artifact
        env:
          REQUIRE_SIGNED: ${{ github.ref == 'refs/heads/main' && '1' || '0' }}
        run: dev/validate-macos-artifact.sh bin/publish/${{ matrix.rid }}

      - name: Archive release
        run: tar -czf WitchyBND-${{ needs.get-version.outputs.version }}-${{ matrix.rid }}.tar.gz -C bin/publish/${{ matrix.rid }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WitchyBND-SHA${{ github.sha }}-${{ matrix.rid }}
          path: WitchyBND-${{ needs.get-version.outputs.version }}-${{ matrix.rid }}.tar.gz

  release:
    if: github.ref == 'refs/heads/main'
    needs: [ get-version, build-windows, build-linux, build-macos ]
    runs-on: windows-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          pattern: WitchyBND-SHA*

      - name: Upload Release
        uses: ncipollo/release-action@v1
        with:
          tag: '${{ needs.get-version.outputs.version }}'
          artifacts: 'WitchyBND-SHA${{ github.sha }}-win-x64\WitchyBND-${{ needs.get-version.outputs.version }}-win-x64.zip,WitchyBND-SHA${{ github.sha }}-linux-x64\WitchyBND-${{ needs.get-version.outputs.version }}-linux-x64.zip,WitchyBND-SHA${{ github.sha }}-osx-arm64\WitchyBND-${{ needs.get-version.outputs.version }}-osx-arm64.tar.gz,WitchyBND-SHA${{ github.sha }}-osx-x64\WitchyBND-${{ needs.get-version.outputs.version }}-osx-x64.tar.gz'
          bodyFile: 'WitchyBND-SHA${{ github.sha }}-NOTES\NOTES.md'
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true
          allowUpdates: true
          removeArtifacts: true
